name: Build and deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [notes-updated]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog code
        uses: actions/checkout@v4

      - name: Clone notes content
        run: |
          rm -rf content
          git clone --depth=1 https://github.com/tttrove/tttrove-vault.git content
          rm -rf content/.git content/.obsidian content/.github content/.gitignore content/.gitattributes
          echo "=== content directory listing ==="
          ls -la content/
          echo "=== recursive md files ==="
          find content/ -name "*.md" | head -30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Build site
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== content files ==="
          ls -la content/
          echo "=== md file count ==="
          find content -name "*.md" | wc -l
          echo "=== building with node ==="
          chmod +x ./quartz/bootstrap-cli.mjs
          node ./quartz/bootstrap-cli.mjs build -d content -v 2>&1

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tttrove-vault-blog --branch=main
